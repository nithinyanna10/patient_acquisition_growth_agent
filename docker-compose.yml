services:
  db:
    image: postgres:16-alpine
    container_name: growth-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: growth_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d growth_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: growth-agent-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/growth_agent
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: growth-agent-ui
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  postgres_data:
